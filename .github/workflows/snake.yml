name: Contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: gourabsingha1
          outputs: |
            github-contribution-grid-snake.svg?color_snake=#22d3ee&color_dots=#111827,#0c3547,#155e75,#0891b2,#22d3ee
            github-contribution-grid-snake-dark.svg?color_snake=#22d3ee&color_dots=#111827,#0c3547,#155e75,#0891b2,#22d3ee

      # Post-process: inject neon glow + rounded cells
      - name: Style snake SVGs
        run: |
          GLOW_CSS='.c{rx:3px;ry:3px}.s{filter:drop-shadow(0 0 6px #22d3ee) drop-shadow(0 0 12px #0891b2)}.u{filter:drop-shadow(0 0 4px rgba(34,211,238,0.5))}'
          for f in github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg; do
            sed -i "s|</style>|${GLOW_CSS}</style>|" "$f"
          done

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution snake"
          file_pattern: "github-contribution-grid-snake*.svg"
