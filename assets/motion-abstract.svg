<svg width="960" height="200" viewBox="0 0 960 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark cosmic background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02040a" />
      <stop offset="50%" stop-color="#080e1c" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>

    <!-- Glowing cyan gradient for active paths -->
    <linearGradient id="glowCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </linearGradient>

    <!-- Glowing magenta gradient for secondary paths -->
    <linearGradient id="glowMagenta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffb199" />
      <stop offset="100%" stop-color="#ff0844" stop-opacity="0" />
    </linearGradient>

    <!-- Blur filter for glowing effect -->
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" fill="url(#bg)" />

  <!-- Animated Grid / Grid lines -->
  <g stroke="rgba(255, 255, 255, 0.05)" stroke-width="1">
    <!-- Horizontal lines -->
    <line x1="0" y1="40" x2="960" y2="40" />
    <line x1="0" y1="80" x2="960" y2="80" />
    <line x1="0" y1="120" x2="960" y2="120" />
    <line x1="0" y1="160" x2="960" y2="160" />
    <!-- Vertical lines -->
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="320" y1="0" x2="320" y2="200" />
    <line x1="480" y1="0" x2="480" y2="200" />
    <line x1="640" y1="0" x2="640" y2="200" />
    <line x1="800" y1="0" x2="800" y2="200" />
  </g>

  <!-- Animated Data Streams (Horizontal Flow) -->
  <g filter="url(#blurGlow)">
    <!-- Cyan Stream 1 -->
    <rect x="-200" y="79" width="150" height="2" fill="url(#glowCyan)">
      <animate attributeName="x" from="-200" to="960" dur="3s" repeatCount="indefinite" />
    </rect>

    <!-- Magenta Stream 1 -->
    <rect x="-200" y="119" width="120" height="2" fill="url(#glowMagenta)">
      <animate attributeName="x" from="-200" to="960" dur="4.5s" repeatCount="indefinite" begin="1s" />
    </rect>

    <!-- Cyan Stream 2 (Reverse) -->
    <rect x="960" y="159" width="100" height="2" fill="url(#glowCyan)">
      <animate attributeName="x" from="960" to="-200" dur="2.5s" repeatCount="indefinite" begin="0.5s" />
    </rect>
  </g>

  <!-- Orbital Rings in the center -->
  <g transform="translate(480, 100)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" stroke-dasharray="4 4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </circle>
    
    <!-- Middle Ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="rgba(79, 172, 254, 0.3)" stroke-width="2" stroke-dasharray="20 10 5 10">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite" />
    </circle>
    
    <!-- Inner Ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(255, 8, 68, 0.4)" stroke-width="1.5">
      <animate attributeName="r" values="30; 32; 30" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Core Glowing Orb -->
    <circle cx="0" cy="0" r="10" fill="#fff" filter="url(#blurGlow)">
      <animate attributeName="r" values="8; 12; 8" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 1; 0.8" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Orbiting Nodes -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite" />
      <circle cx="45" cy="0" r="4" fill="#4facfe" filter="url(#blurGlow)" />
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="8s" repeatCount="indefinite" />
      <circle cx="60" cy="0" r="3" fill="#ffb199" filter="url(#blurGlow)" />
    </g>
  </g>

  <!-- Decorative text / Tech specs -->
  <text x="20" y="30" fill="#64748b" font-family="monospace" font-size="10" letter-spacing="2">SYS_NODE_7X</text>
  <text x="880" y="30" fill="#64748b" font-family="monospace" font-size="10" letter-spacing="2">R_7.04.1</text>
  <text x="20" y="180" fill="#64748b" font-family="monospace" font-size="10" letter-spacing="2">PIPELINE_ACTIVE</text>
  <text x="860" y="180" fill="#64748b" font-family="monospace" font-size="10" letter-spacing="2">LATENCY: 12MS</text>
</svg>
