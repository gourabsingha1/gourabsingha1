      .tech { font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #cbd5e1; letter-spacing: 1px; }
      .core { fill: #00f2fe; font-weight: 700; }
    </style>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02040a" />
