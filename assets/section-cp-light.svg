<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 90" role="img" aria-label="Competitive programming">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="transparent"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0; -1 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="960" height="90" rx="14" fill="url(#bg)" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  
  <!-- Subtle Grid -->
  <path d="M0 45 H960" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <path d="M220 0 V90" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- Animated Line -->
  <rect x="220" y="44" width="710" height="1" fill="url(#g)" opacity="0.6"/>
  <circle cx="220" cy="44.5" r="3" fill="#f472b6" filter="url(#glow)"/>

  <text x="34" y="50" font-family="'Inter', 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#64748b" letter-spacing="0.2em">SECTION 03</text>
  <text x="240" y="51" font-family="'Outfit', 'Inter', 'SF Pro Display', sans-serif" font-size="28" font-weight="700" fill="#0f172a" letter-spacing="-0.02em">Competitive Programming</text>
</svg>
